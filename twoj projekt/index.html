


		


<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holistic Day Spa · Aleksandra Murzyniak · Nysa</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
--gold: #b8965a;
--gold-light: #d4b483;
--gold-pale: #f5edd8;
--white: #ffffff;
--off-white: #faf9f7;
--cream: #f3ede3;
--light-grey: #f0ede8;
--mid-grey: #e0dbd3;
--text-dark: #1a1a18;
--text-mid: #5c5850;
--text-soft: #9a9490;
--green: #4a6741;
--green-light: #7a9a76;
--green-pale: #eaf0e8;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--white);font-family:'Montserrat',sans-serif;color:var(--text-dark);overflow-x:hidden;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(–off-white);}
::-webkit-scrollbar-thumb{background:var(–gold-light);}

/* ── NAV ── */
nav{
position:relative;top:0;left:0;right:0;z-index:1000;
height:90px;
background:rgba(255,255,255,0.96);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(184,150,90,0.15);
display:flex;align-items:center;justify-content:space-between;
padding:0 60px;
transition:all 0.3s ease;
}
.nav-brand{
font-family:‘Cormorant Garamond’,serif;
font-size:20px;font-weight:400;letter-spacing:3px;
text-transform:uppercase;color:var(–text-dark);
text-decoration:none;
}
.nav-brand span{color:var(–gold);font-style:italic;}
.nav-links{display:flex;gap:36px;list-style:none;align-items:center;}
.nav-links a{
font-size:10px;letter-spacing:3px;text-transform:uppercase;
color:var(–text-mid);text-decoration:none;font-weight:500;
transition:color 0.3s;
}
.nav-links a:hover{color:var(–gold);}
.nav-book{
background:var(–text-dark);color:var(–white)!important;
padding:10px 24px;letter-spacing:2px!important;
transition:background 0.3s!important;
}
.nav-book:hover{background:var(–gold)!important;color:var(–white)!important;}

/* ── HERO ── */
.hero{
min-height:100vh;
background: linear-gradient(160deg, #faf9f7 0%, #f3ede3 50%, #eaf0e8 100%);
display:grid;grid-template-columns:1fr 1fr;
align-items:center;
padding:0;
position:relative;overflow:hidden;
}
.hero::before{
content:’’;position:absolute;
top:-100px;right:-100px;
width:600px;height:600px;
background:radial-gradient(circle,rgba(184,150,90,0.08) 0%,transparent 70%);
border-radius:50%;
}
.hero::after{
content:’’;position:absolute;
bottom:-50px;left:10%;
width:400px;height:400px;
background:radial-gradient(circle,rgba(74,103,65,0.06) 0%,transparent 70%);
border-radius:50%;
}
.hero-text{
padding:80px 60px 80px 80px;
position:relative;z-index:1;
display:flex;flex-direction:column;align-items:flex-start;
}
.hero-eyebrow{
font-size:10px;letter-spacing:5px;text-transform:uppercase;
color:var(–gold);font-weight:500;margin-bottom:24px;
display:flex;align-items:center;gap:16px;
}
.hero-eyebrow::before{display:none;}
.hero-title{
font-family:‘Cormorant Garamond’,serif;
font-size:clamp(56px,6vw,88px);
font-weight:300;line-height:1;
color:var(–text-dark);margin-bottom:20px;
}
.hero-title em{font-style:italic;color:var(–green);}
.hero-subtitle{
font-size:12px;letter-spacing:4px;text-transform:uppercase;
color:var(–text-soft);margin-bottom:32px;font-weight:300;
}
.hero-desc{
font-family:‘Cormorant Garamond’,serif;
font-size:20px;font-weight:300;font-style:italic;
color:var(–text-mid);line-height:1.7;
max-width:440px;margin-bottom:48px;
}
.hero-actions{display:flex;gap:16px;flex-wrap:wrap;}
.btn-primary{
padding:16px 40px;background:var(–text-dark);color:var(–white);
font-size:10px;letter-spacing:3px;text-transform:uppercase;
font-weight:500;text-decoration:none;
transition:all 0.3s;display:inline-block;font-family:‘Montserrat’,sans-serif;
}
.btn-primary:hover{background:var(–gold);}
.btn-outline{
padding:16px 40px;border:1px solid var(–text-dark);color:var(–text-dark);
font-size:10px;letter-spacing:3px;text-transform:uppercase;
font-weight:500;text-decoration:none;
transition:all 0.3s;display:inline-block;font-family:‘Montserrat’,sans-serif;
}
.btn-outline:hover{background:var(–text-dark);color:var(–white);}
.hero-image{
height:100vh;position:relative;overflow:hidden;
background:linear-gradient(135deg,#faf9f7 0%,#f3ede3 50%,#eaf0e8 100%);
display:flex;align-items:center;justify-content:center;
}
.hero-image-placeholder{
text-align:center;color:rgba(74,103,65,0.4);
}
.hero-image-placeholder .icon{font-size:80px;display:block;margin-bottom:16px;}
.hero-image-placeholder p{
font-size:11px;letter-spacing:3px;text-transform:uppercase;
font-weight:300;
}
.hero-stats{
position:absolute;bottom:40px;left:80px;
display:flex;gap:48px;z-index:1;
}
.hero-stat-num{
font-family:‘Cormorant Garamond’,serif;
font-size:40px;font-weight:300;color:var(–text-dark);line-height:1;
}
.hero-stat-label{
font-size:9px;letter-spacing:3px;text-transform:uppercase;
color:var(–text-soft);font-weight:400;margin-top:4px;
}

/* ── GOLD STRIP ── */
.gold-strip{
background:var(–text-dark);
padding:18px 60px;
display:flex;align-items:center;justify-content:center;gap:48px;
flex-wrap:wrap;
}
.gold-strip-item{
font-size:9px;letter-spacing:4px;text-transform:uppercase;
color:rgba(255,255,255,0.6);font-weight:400;
display:flex;align-items:center;gap:12px;
}
.gold-strip-item::after{
content:’·’;color:var(–gold);font-size:20px;line-height:0;
}
.gold-strip-item:last-child::after{display:none;}

/* ── SECTION COMMONS ── */
section{padding:100px 80px;}
.section-tag{
font-size:9px;letter-spacing:5px;text-transform:uppercase;
color:var(–gold);font-weight:500;margin-bottom:16px;
display:flex;align-items:center;gap:16px;
}
.section-tag::before{content:’’;width:30px;height:1px;background:var(–gold);}
.section-title{
font-family:‘Cormorant Garamond’,serif;
font-size:clamp(36px,4vw,56px);
font-weight:300;line-height:1.1;color:var(–text-dark);
}
.section-title em{font-style:italic;color:var(–green);}
.section-divider{
width:50px;height:1px;
background:linear-gradient(90deg,var(–gold),transparent);
margin:24px 0;
}
.section-desc{
font-family:‘Cormorant Garamond’,serif;
font-size:18px;font-weight:300;font-style:italic;
color:var(–text-mid);line-height:1.7;
max-width:560px;
}

/* ── PHILOSOPHY ── */
.philosophy{
background:var(–off-white);
display:grid;grid-template-columns:1fr 1fr;gap:80px;
align-items:center;
}
.philosophy-image{
aspect-ratio:4/5;
background:linear-gradient(145deg,#e8f0e5,#c4d8c0);
display:flex;align-items:center;justify-content:center;
position:relative;overflow:hidden;
}
.philosophy-image::after{
content:’’;position:absolute;inset:16px;
border:1px solid rgba(184,150,90,0.3);
pointer-events:none;
}
.philosophy-image-ph{text-align:center;color:rgba(74,103,65,0.35);}
.philosophy-image-ph .icon{font-size:64px;display:block;margin-bottom:12px;}
.philosophy-image-ph p{font-size:10px;letter-spacing:3px;text-transform:uppercase;}

.philosophy-values{
display:grid;grid-template-columns:1fr 1fr;gap:32px;
margin-top:48px;
}
.philosophy-value{border-left:2px solid var(–gold-pale);padding-left:20px;}
.philosophy-value h4{
font-family:‘Cormorant Garamond’,serif;
font-size:18px;font-weight:400;color:var(–text-dark);margin-bottom:8px;
}
.philosophy-value p{
font-size:12px;color:var(–text-soft);line-height:1.7;font-weight:300;
}

/* ── TEAM ── */
.team{background:var(–white);}
.team-header{text-align:center;margin-bottom:64px;}
.team-header .section-tag{justify-content:center;}
.team-header .section-tag::before{display:none;}
.team-grid{
display:grid;grid-template-columns:repeat(4,1fr);gap:32px;
max-width:1200px;margin:0 auto;
}
.team-card{text-align:center;}
.team-photo{
aspect-ratio:3/4;margin-bottom:28px;
background:linear-gradient(145deg,var(–cream),var(–light-grey));
position:relative;overflow:hidden;
display:flex;align-items:center;justify-content:center;
}
.team-photo::after{
content:’’;position:absolute;
bottom:0;left:0;right:0;height:40%;
background:linear-gradient(to top,rgba(26,26,24,0.4),transparent);
}
.team-photo-ph{text-align:center;color:rgba(90,88,80,0.3);}
.team-photo-ph .icon{font-size:48px;display:block;margin-bottom:8px;}
.team-photo-ph p{font-size:9px;letter-spacing:2px;text-transform:uppercase;}
.team-name{
font-family:‘Cormorant Garamond’,serif;
font-size:22px;font-weight:400;color:var(–text-dark);margin-bottom:6px;
}
.team-role{
font-size:9px;letter-spacing:3px;text-transform:uppercase;
color:var(–gold);font-weight:500;margin-bottom:16px;
}
.team-bio{
font-size:12px;color:var(–text-mid);line-height:1.8;
font-weight:300;
}

/* ── EQUIPMENT ── */
.equipment{
background:var(–text-dark);
color:var(–white);
}
.equipment .section-tag{color:var(–gold-light);}
.equipment .section-tag::before{background:var(–gold-light);}
.equipment .section-title{color:var(–white);}
.equipment .section-desc{color:rgba(255,255,255,0.5);}
.equipment-grid{
display:grid;grid-template-columns:repeat(3,1fr);gap:2px;
margin-top:64px;
}
.equipment-item{
background:rgba(255,255,255,0.04);
padding:48px 40px;
border-top:1px solid rgba(255,255,255,0.06);
transition:background 0.3s;
}
.equipment-item:hover{background:rgba(184,150,90,0.08);}
.eq-icon{font-size:28px;margin-bottom:20px;display:block;}
.eq-name{
font-family:‘Cormorant Garamond’,serif;
font-size:20px;font-weight:400;color:var(–white);margin-bottom:10px;
}
.eq-brand{
font-size:9px;letter-spacing:3px;text-transform:uppercase;
color:var(–gold-light);margin-bottom:12px;
}
.eq-desc{font-size:12px;color:rgba(255,255,255,0.4);line-height:1.7;font-weight:300;}

/* ── PRICE LIST ── */
.pricelist{background:var(–off-white);}
.pricelist-header{text-align:center;margin-bottom:64px;}
.pricelist-header .section-tag{justify-content:center;}
.pricelist-header .section-tag::before{display:none;}
.pricelist-header .section-divider{margin:24px auto;}
.tab-nav{
display:flex;flex-wrap:wrap;justify-content:center;
gap:0;margin-bottom:64px;
border-bottom:1px solid var(–mid-grey);
}
.tab-btn{
padding:14px 28px;
font-size:9px;letter-spacing:2px;text-transform:uppercase;
font-weight:500;color:var(–text-soft);background:transparent;
border:none;cursor:pointer;font-family:‘Montserrat’,sans-serif;
transition:all 0.3s;border-bottom:2px solid transparent;margin-bottom:-1px;
}
.tab-btn:hover{color:var(–text-dark);}
.tab-btn.active{color:var(–gold);border-bottom-color:var(–gold);}
.tab-content{display:none;}
.tab-content.active{display:block;}
.price-category{
max-width:800px;margin:0 auto 48px;
animation:fadeIn 0.4s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.price-cat-title{
font-family:‘Cormorant Garamond’,serif;
font-size:28px;font-weight:300;color:var(–text-dark);
padding:0 0 16px;margin-bottom:0;
border-bottom:1px solid var(–mid-grey);
display:flex;align-items:center;gap:12px;
}
.price-cat-title::before{
content:’’;width:24px;height:1px;background:var(–gold);flex-shrink:0;
}
.price-row{
display:flex;align-items:center;justify-content:space-between;
padding:14px 0;border-bottom:1px solid rgba(224,219,211,0.6);
gap:16px;
}
.price-row:last-child{border-bottom:none;}
.price-name{
font-size:13px;color:var(–text-dark);font-weight:300;flex:1;line-height:1.4;
}
.price-duration{
font-size:10px;color:var(–text-soft);letter-spacing:1px;margin-right:16px;
white-space:nowrap;
}
.price-amount{
font-family:‘Cormorant Garamond’,serif;
font-size:20px;font-weight:400;color:var(–text-dark);
white-space:nowrap;min-width:90px;text-align:right;
}
.price-amount.free{color:var(–green);font-size:14px;font-family:‘Montserrat’,sans-serif;font-weight:400;letter-spacing:1px;}

/* ── GALLERY ── */
.gallery{background:var(–white);}
.gallery-header{text-align:center;margin-bottom:48px;}
.gallery-header .section-tag{justify-content:center;}
.gallery-header .section-tag::before{display:none;}
.gallery-grid{
display:grid;
grid-template-columns:2fr 1fr 1fr;
grid-template-rows:300px 300px;
gap:8px;max-width:1200px;margin:0 auto;
}
.gallery-item{
background:linear-gradient(135deg,var(–cream),var(–light-grey));
display:flex;align-items:center;justify-content:center;
position:relative;overflow:hidden;cursor:pointer;
transition:transform 0.4s ease;
}
.gallery-item:hover{transform:scale(0.99);}
.gallery-item:first-child{grid-row:1/3;}
.gallery-item .ph{text-align:center;color:rgba(90,88,80,0.25);}
.gallery-item .ph .icon{font-size:40px;display:block;margin-bottom:8px;}
.gallery-item .ph p{font-size:9px;letter-spacing:2px;text-transform:uppercase;}
.gallery-item .overlay{
position:absolute;inset:0;
background:linear-gradient(to top,rgba(26,26,24,0.5),transparent 50%);
opacity:0;transition:opacity 0.3s;
display:flex;align-items:flex-end;padding:24px;
}
.gallery-item:hover .overlay{opacity:1;}
.overlay-text{
font-size:10px;letter-spacing:3px;text-transform:uppercase;
color:white;font-weight:400;
}
.gallery-note{
text-align:center;margin-top:32px;
font-size:11px;letter-spacing:3px;text-transform:uppercase;
color:var(–text-soft);
}
.gallery-note a{color:var(–gold);text-decoration:none;}

/* ── ABOUT / OWNER ── */
.about{
background:var(–cream);
display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;
}
.about-image{
aspect-ratio:3/4;
background:linear-gradient(145deg,#e0d8cc,#ccc4b8);
position:relative;display:flex;align-items:center;justify-content:center;
}
.about-image::before{
content:‘A’;
font-family:‘Cormorant Garamond’,serif;
font-size:200px;font-weight:300;color:rgba(184,150,90,0.12);
line-height:1;
}
.about-image-frame{
position:absolute;inset:20px;border:1px solid rgba(184,150,90,0.25);
}
.about-quote{
font-family:‘Cormorant Garamond’,serif;
font-size:clamp(24px,3vw,36px);font-weight:300;font-style:italic;
color:var(–text-dark);line-height:1.4;margin-bottom:32px;
}
.about-body{
font-size:13px;color:var(–text-mid);line-height:1.9;
font-weight:300;margin-bottom:32px;
}
.about-signature{
font-family:‘Cormorant Garamond’,serif;
font-size:32px;font-style:italic;color:var(–gold);
}

/* ── CONTACT ── */
.contact{
background:var(–white);
display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;
}
.contact-map{
aspect-ratio:1;
background:linear-gradient(145deg,var(–green-pale),#d4e4d0);
display:flex;align-items:center;justify-content:center;
font-size:64px;position:relative;overflow:hidden;
}
.contact-map::after{
content:’’;position:absolute;inset:16px;
border:1px solid rgba(74,103,65,0.2);
}
.contact-info{padding:20px 0;}
.contact-item{
display:flex;gap:24px;padding:24px 0;
border-bottom:1px solid var(–mid-grey);
}
.contact-item:last-child{border-bottom:none;}
.contact-icon{
width:44px;height:44px;background:var(–gold-pale);
display:flex;align-items:center;justify-content:center;
font-size:18px;flex-shrink:0;
}
.contact-label{
font-size:9px;letter-spacing:3px;text-transform:uppercase;
color:var(–gold);font-weight:500;margin-bottom:6px;
}
.contact-value{
font-family:‘Cormorant Garamond’,serif;
font-size:20px;font-weight:400;color:var(–text-dark);
}
.contact-value a{color:var(–text-dark);text-decoration:none;}
.contact-value a:hover{color:var(–gold);}
.contact-sub{
font-size:11px;color:var(–text-soft);margin-top:4px;font-weight:300;
}
.booksy-btn{
display:block;width:100%;margin-top:40px;
padding:18px 40px;background:var(–gold);color:var(–white);
font-size:10px;letter-spacing:4px;text-transform:uppercase;
font-weight:500;text-decoration:none;text-align:center;
font-family:‘Montserrat’,sans-serif;
transition:background 0.3s;
}
.booksy-btn:hover{background:var(–text-dark);}

/* ── FOOTER ── */
footer{
background:var(–text-dark);color:rgba(255,255,255,0.4);
padding:40px 80px;
display:flex;align-items:center;justify-content:space-between;
flex-wrap:wrap;gap:16px;
}
.footer-brand{
font-family:‘Cormorant Garamond’,serif;
font-size:18px;font-weight:300;letter-spacing:2px;
color:rgba(255,255,255,0.7);
}
.footer-brand span{color:var(–gold-light);font-style:italic;}
.footer-links{display:flex;gap:24px;flex-wrap:wrap;}
.footer-links a{
font-size:10px;letter-spacing:2px;text-transform:uppercase;
color:rgba(255,255,255,0.35);text-decoration:none;
transition:color 0.3s;
}
.footer-links a:hover{color:var(–gold-light);}
.footer-copy{
font-size:10px;letter-spacing:1px;
color:rgba(255,255,255,0.2);
}

/* ── RESPONSIVE ── */
@media(max-width:900px){
nav{padding:0 24px;}
.nav-links{display:none;}
section{padding:60px 24px;}
.hero{grid-template-columns:1fr;min-height:auto;}
.hero-text{padding:120px 24px 60px;}
.hero-image{height:50vw;min-height:300px;}
.hero-stats{left:24px;bottom:20px;gap:24px;}
.hero-stat-num{font-size:28px;}
.philosophy,.about,.contact{grid-template-columns:1fr;}
.team-grid{grid-template-columns:1fr 1fr;}
.equipment-grid{grid-template-columns:1fr;}
.gallery-grid{grid-template-columns:1fr 1fr;grid-template-rows:auto;}
.gallery-item:first-child{grid-row:auto;}
footer{padding:32px 24px;}
.gold-strip{padding:16px 24px;gap:16px;}
}
@media(max-width:600px){
.team-grid{grid-template-columns:1fr;}
.tab-btn{padding:12px 14px;font-size:8px;}
.philosophy-values{grid-template-columns:1fr;}
}

/* ── ANIMATIONS ── */
.fade-up{opacity:0;transform:translateY(30px);transition:opacity 0.7s ease,transform 0.7s ease;}
.fade-up.visible{opacity:1;transform:translateY(0);}
</style>

</head>
<body>

<!-- NAV -->

<div style="width:100%;background:linear-gradient(160deg, #faf9f7 0%, #f3ede3 50%, #eaf0e8 100%);padding:48px 24px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid rgba(184,150,90,0.2);">
